name: Get cyspbot app token
description: Exchange a GitHub Actions OIDC token for a short-lived repository-scoped GitHub App installation token from cyspbot.

inputs:
  audience:
    description: GitHub Actions OIDC audience for the cyspbot service.
    required: false
    default: cyspbot
  cyspbot-token-url:
    description: HTTPS token exchange endpoint URL for the cyspbot service.
    required: false
    default: https://cyspbot.chikachow.org/token
  resource:
    description: GitHub repository API URI to request. Defaults to https://api.github.com/repos/${GITHUB_REPOSITORY}.
    required: false
  scope:
    description: Space-delimited GitHub App permission scopes to request.
    required: false
    default: contents:write pull_requests:write

outputs:
  token:
    description: Short-lived GitHub App installation token.
  expires_at:
    description: Expiration timestamp for the minted installation token.
  scope:
    description: Canonical GitHub App permission scope issued by cyspbot.

runs:
  using: node24
  main: dist/index.js
