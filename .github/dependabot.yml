version: 2

updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "16:30"
      timezone: "Australia/Sydney"
    cooldown:
      default-days: 2
    commit-message:
      prefix: "chore(github/workflows)"

  - package-ecosystem: npm
    directory: /
    schedule:
      interval: daily
      time: "16:30"
      timezone: "Australia/Sydney"
    cooldown:
      default-days: 2
    versioning-strategy: increase
    commit-message:
      prefix: "chore(deps)"
      prefix-development: "chore(deps-dev)"
