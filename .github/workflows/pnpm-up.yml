name: pnpm-up

on:
  schedule:
    - cron: "15 9 * * *"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: chikachow/cyspbot-app-token-action@8894f93a0c17b5a160dafa8df13a46c0399f80a8 # v0.0.4
        id: cyspbot

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
        with:
          run_install: false

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - run: pnpm up -r

      - run: pnpm dedupe

      - uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          token: ${{ steps.cyspbot.outputs.token }}
          commit-message: "chore(deps): bump transitive dependencies"
          title: "chore(deps): bump transitive dependencies"
          body: ""
          branch: "deps/pnpm-up"
          sign-commits: true
