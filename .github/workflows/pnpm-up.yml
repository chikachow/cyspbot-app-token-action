name: pnpm-up

on:
  schedule:
    - cron: "15 9 * * *"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: chikachow/cyspbot-app-token-action@a70b4b3212ad874677e6c676cb6bc502cce09ced # v0.0.8
        id: cyspbot

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          run_install: false

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - run: pnpm up -r

      - run: pnpm dedupe

      - uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          token: ${{ steps.cyspbot.outputs.token }}
          commit-message: "chore(deps): bump transitive dependencies"
          title: "chore(deps): bump transitive dependencies"
          body: ""
          branch: "deps/pnpm-up"
          sign-commits: true
