name: prepare-release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Full semantic version tag to publish, for example v1.2.3
        required: true
        type: string
      prerelease:
        description: Publish as a prerelease
        required: true
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  prepare-release:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
        with:
          run_install: false

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: node --run check

      - name: Validate requested version
        env:
          VERSION: ${{ inputs.version }}
        run: |
          if [[ ! "${VERSION}" =~ ^v([0-9]+)\.([0-9]+)\.([0-9]+)$ ]]; then
            echo "Expected version like v1.2.3, got ${VERSION}" >&2
            exit 1
          fi

      - name: Create release commit
        env:
          VERSION: ${{ inputs.version }}
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com

          git add -f dist action.yml
          git commit -m "build(release): bundle ${VERSION}"

      - name: Publish immutable release tag
        env:
          VERSION: ${{ inputs.version }}
        run: |
          git tag "${VERSION}"
          git push origin "refs/tags/${VERSION}"

      - name: Update compatibility tags
        if: ${{ !inputs.prerelease }}
        env:
          VERSION: ${{ inputs.version }}
        run: |
          [[ "${VERSION}" =~ ^(v[0-9]+)\.([0-9]+)\.([0-9]+)$ ]]

          major_tag="${BASH_REMATCH[1]}"
          minor_tag="${BASH_REMATCH[1]}.${BASH_REMATCH[2]}"

          git tag -f "${minor_tag}"
          git tag -f "${major_tag}"

          git push --force origin "refs/tags/${minor_tag}"
          git push --force origin "refs/tags/${major_tag}"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ inputs.version }}
        run: |
          prerelease_flags=()

          if [[ "${{ inputs.prerelease }}" == "true" ]]; then
            prerelease_flags+=(--prerelease)
          fi

          gh release create "${VERSION}" --target "${VERSION}" --verify-tag "${prerelease_flags[@]}"
