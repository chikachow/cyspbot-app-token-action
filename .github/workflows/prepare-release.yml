name: prepare-release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Full semantic version tag to publish, for example v1.2.3
        required: true
        type: string
      prerelease:
        description: Publish as a prerelease
        required: true
        default: false
        type: boolean
      previous-version:
        description: Previous release tag to use as the release notes start tag
        required: false
        type: string
      artifact-compare-version:
        description: Existing release tag to compare against the generated action artifact
        required: false
        type: string

permissions:
  contents: write

jobs:
  prepare-release:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
        with:
          run_install: false

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm run check

      - name: Validate artifact changed
        env:
          ARTIFACT_COMPARE_VERSION: ${{ inputs.artifact-compare-version }}
        run: |
          if [[ -z "${ARTIFACT_COMPARE_VERSION}" ]]; then
            exit 0
          fi

          if [[ ! "${ARTIFACT_COMPARE_VERSION}" =~ ^v([0-9]+)\.([0-9]+)\.([0-9]+)(-rc\.([0-9]+))?$ ]]; then
            echo "Expected artifact-compare-version like v1.2.3 or v1.2.3-rc.1, got ${ARTIFACT_COMPARE_VERSION}" >&2
            exit 1
          fi

          git rev-parse --verify "refs/tags/${ARTIFACT_COMPARE_VERSION}" >/dev/null

          if ! git cat-file -e "${ARTIFACT_COMPARE_VERSION}:dist/index.js"; then
            echo "Skipping artifact comparison because ${ARTIFACT_COMPARE_VERSION} does not contain dist/index.js"
            exit 0
          fi

          if cmp -s <(git show "${ARTIFACT_COMPARE_VERSION}:dist/index.js") dist/index.js \
            && cmp -s <(git show "${ARTIFACT_COMPARE_VERSION}:action.yml") action.yml; then
            echo "No action artifact changes detected since ${ARTIFACT_COMPARE_VERSION}" >&2
            exit 1
          fi

      - name: Validate requested version
        env:
          PRERELEASE: ${{ inputs.prerelease }}
          VERSION: ${{ inputs.version }}
        run: |
          if [[ ! "${VERSION}" =~ ^v([0-9]+)\.([0-9]+)\.([0-9]+)(-rc\.([0-9]+))?$ ]]; then
            echo "Expected version like v1.2.3 or v1.2.3-rc.1, got ${VERSION}" >&2
            exit 1
          fi

          if [[ "${PRERELEASE}" == "true" && ! "${VERSION}" =~ -rc\.([0-9]+)$ ]]; then
            echo "Expected prerelease version like v1.2.3-rc.1 when prerelease=true, got ${VERSION}" >&2
            exit 1
          fi

          if [[ "${PRERELEASE}" != "true" && "${VERSION}" =~ -rc\.([0-9]+)$ ]]; then
            echo "Expected stable version like v1.2.3 when prerelease=false, got ${VERSION}" >&2
            exit 1
          fi

      - name: Create release commit
        env:
          VERSION: ${{ inputs.version }}
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com

          git add -f dist action.yml
          git commit -m "build(release): bundle ${VERSION}"

      - name: Publish release tag
        env:
          VERSION: ${{ inputs.version }}
        run: |
          git tag "${VERSION}"
          git push origin "refs/tags/${VERSION}"

      - name: Update compatibility tags
        if: ${{ !inputs.prerelease }}
        env:
          VERSION: ${{ inputs.version }}
        run: |
          [[ "${VERSION}" =~ ^(v[0-9]+)\.([0-9]+)\.([0-9]+)$ ]]

          major_tag="${BASH_REMATCH[1]}"
          minor_tag="${BASH_REMATCH[1]}.${BASH_REMATCH[2]}"

          git tag -f "${minor_tag}"
          git tag -f "${major_tag}"

          git push --force origin "refs/tags/${minor_tag}"
          git push --force origin "refs/tags/${major_tag}"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          PREVIOUS_VERSION: ${{ inputs.previous-version }}
          VERSION: ${{ inputs.version }}
          TARGET_COMMIT: ${{ github.sha }}
        run: |
          notes_flags=(--generate-notes)
          prerelease_flags=()

          if [[ "${{ inputs.prerelease }}" == "true" ]]; then
            prerelease_flags+=(--prerelease)
          fi

          if [[ -n "${PREVIOUS_VERSION}" ]]; then
            if [[ ! "${PREVIOUS_VERSION}" =~ ^v([0-9]+)\.([0-9]+)\.([0-9]+)$ ]]; then
              echo "Expected previous-version like v1.2.3, got ${PREVIOUS_VERSION}" >&2
              exit 1
            fi

            git rev-parse --verify "refs/tags/${PREVIOUS_VERSION}" >/dev/null
            notes_flags+=(--notes-start-tag "${PREVIOUS_VERSION}")
          fi

          gh release create "${VERSION}" --target "${TARGET_COMMIT}" --verify-tag "${notes_flags[@]}" "${prerelease_flags[@]}"
